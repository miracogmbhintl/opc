name: Deploy Euro Office Container

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: opc-euro-office-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      EURO_OFFICE_JWT_SECRET: ${{ secrets.EURO_OFFICE_JWT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          test ${#EURO_OFFICE_JWT_SECRET} -ge 24 || { echo "EURO_OFFICE_JWT_SECRET must contain at least 24 characters"; exit 1; }

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet || true
          docker system prune --all --force || true
          df -h

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install container worker dependencies
        working-directory: workers/euro-office
        run: npm install --no-audit --no-fund

      - name: Bootstrap container worker
        working-directory: workers/euro-office
        run: npx wrangler deploy

      - name: Store DocumentServer JWT secret
        working-directory: workers/euro-office
        shell: bash
        run: printf '%s' "$EURO_OFFICE_JWT_SECRET" | npx wrangler secret put EURO_OFFICE_JWT_SECRET

      - name: Redeploy container worker with secret
        working-directory: workers/euro-office
        run: npx wrangler deploy

      - name: Configure Pages office secrets
        shell: bash
        run: |
          printf '%s' "$EURO_OFFICE_JWT_SECRET" | npx wrangler pages secret put EURO_OFFICE_JWT_SECRET --project-name opc
          printf '%s' 'https://office.opc.miraka.ch' | npx wrangler pages secret put EURO_OFFICE_URL --project-name opc
          printf '%s' 'https://opc.miraka.ch' | npx wrangler pages secret put PUBLIC_SITE_URL --project-name opc

      - name: Install portal dependencies
        run: npm ci

      - name: Build portal
        run: npm run build

      - name: Deploy portal to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name opc --branch main

      - name: Verify runtime endpoints
        shell: bash
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS https://office.opc.miraka.ch/healthcheck; then
              echo
              echo "Euro-Office DocumentServer is ready."
              exit 0
            fi
            echo "Waiting for Cloudflare Container provisioning ($attempt/30)..."
            sleep 20
          done
          echo "Container deployment completed, but healthcheck did not become ready in time."
          exit 1
