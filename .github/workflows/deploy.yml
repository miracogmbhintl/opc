# Optional: GitHub Actions workflow for additional CI/CD
# Cloudflare Pages will auto-deploy, but this can run tests first

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npx astro check
        continue-on-error: true
      
      - name: Build
        run: npm run build
      
      - name: Build Success
        run: echo "✅ Build completed successfully"
