name: Apply calendar visibility fix

on:
  push:
    branches:
      - codex/fix-calendar-job-visibility
    paths:
      - .github/workflows/apply-calendar-visibility-fix.yml

permissions:
  contents: write

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-calendar-job-visibility
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply source patches
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, old: str, new: str):
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one literal match, found {count}')
              file.write_text(text.replace(old, new, 1))

          def regex_once(path: str, pattern: str, replacement: str):
              file = Path(path)
              text = file.read_text()
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one regex match, found {count}')
              file.write_text(updated)

          calendar_page = 'src/components/opc/calendar/OPCCalendarPage.tsx'
          replace_once(
              calendar_page,
              "const [activeTab, setActiveTab] = useState<CalendarViewFilter>('all');",
              "const [activeTab, setActiveTab] = useState<CalendarViewFilter>('team');",
          )
          replace_once(
              calendar_page,
              "return ownCalendar?.id || teamCalendar?.id || employeeCalendar?.id || calendars[0]?.id || '';",
              "return teamCalendar?.id || ownCalendar?.id || employeeCalendar?.id || calendars[0]?.id || '';",
          )
          replace_once(
              calendar_page,
              '<option value="all">Alle Kalender</option>\n            <option value="employee">Mitarbeiter</option>\n            <option value="admin">Admin</option>\n            <option value="team">Team</option>',
              '<option value="team">Gesamtes Team</option>\n            <option value="employee">Mein Mitarbeiterkalender</option>\n            <option value="admin">Mein privater Admin-Kalender</option>\n            <option value="all">Team und mein Kalender</option>',
          )

          events_path = 'src/pages/api/opc/calendar/events.ts'
          replace_once(
              events_path,
              "  if (ownsCalendar) return true;\n\n  if (isJobCalendarEvent(event)) {",
              "  if (ownsCalendar) return true;\n\n  // The company calendar is intentionally visible to every portal employee.\n  // Private employee/admin calendars remain owner-only.\n  if (calendar.calendar_type === 'team' && calendar.is_private !== true) return true;\n\n  if (isJobCalendarEvent(event)) {",
          )
          replace_once(
              events_path,
              "\n  if (calendar.calendar_type === 'team') {\n    return true;\n  }\n\n  return false;",
              "\n  return false;",
          )

          events_helper_anchor = "function canEmployeeSeeEvent(\n"
          events_helper = r'''const INACTIVE_ASSIGNMENT_STATUSES = new Set([
  'removed',
  'unassigned',
  'cancelled',
  'canceled',
  'deleted',
  'inactive',
  'rejected',
]);

function isMissingColumnError(error: any) {
  const code = String(error?.code || '');
  const message = String(error?.message || '').toLowerCase();
  return code === '42703' || (message.includes('column') && message.includes('does not exist'));
}

async function fetchAssignedJobIdsForUser(
  serviceSupabase: ReturnType<typeof createClient>,
  context: Awaited<ReturnType<typeof resolveCurrentUserContext>>,
  userId: string
) {
  const jobIds = new Set<string>();
  const allIdentifiers = Array.from(
    new Set([...context.staffRoleIds, ...context.employeeIds, userId].filter(Boolean).map(String))
  );
  const attempts: Array<{ column: string; values: string[] }> = [
    { column: 'staff_role_id', values: context.staffRoleIds },
    { column: 'staff_id', values: context.staffRoleIds },
    { column: 'employee_id', values: context.employeeIds },
    { column: 'user_id', values: [userId] },
    { column: 'employee_user_id', values: [userId] },
    { column: 'assigned_to', values: allIdentifiers },
  ];

  for (const attempt of attempts) {
    if (attempt.values.length === 0) continue;

    const { data, error } = await serviceSupabase
      .from('opc_job_assignments')
      .select('job_id,status')
      .in(attempt.column, attempt.values)
      .not('job_id', 'is', null)
      .range(0, 9999);

    if (error) {
      if (isMissingColumnError(error)) continue;
      throw error;
    }

    for (const row of data || []) {
      const status = String(row.status || 'assigned').toLowerCase();
      if (!INACTIVE_ASSIGNMENT_STATUSES.has(status) && row.job_id) {
        jobIds.add(String(row.job_id));
      }
    }
  }

  return jobIds;
}

'''
          replace_once(events_path, events_helper_anchor, events_helper + events_helper_anchor)

          visible_calendars_old = r'''    const visibleCalendars = allCalendars.filter((calendar: AnyRow) => {
      if (context.canViewAllJobs || isAdminRole(currentRole)) return true;

      if (normalizedCurrentRole === 'employee') {
        return (
          calendar.calendar_type === 'team' ||
          calendar.owner_user_id === user.id ||
          context.staffRoleIds.includes(calendar.owner_staff_role_id)
        );
      }

      return calendar.owner_user_id === user.id;
    });'''
          visible_calendars_new = r'''    const visibleCalendars = allCalendars.filter((calendar: AnyRow) => {
      const ownsCalendar =
        calendar.owner_user_id === user.id ||
        (calendar.owner_staff_role_id && context.staffRoleIds.includes(calendar.owner_staff_role_id));

      // The non-private team calendar is shared with every authenticated portal role.
      if (calendar.calendar_type === 'team' && calendar.is_private !== true) return true;
      if (ownsCalendar) return true;

      // Even owner/admin/dispatch must not see another person's private calendar.
      if (calendar.is_private === true) return false;

      return context.canViewAllJobs || isAdminRole(currentRole);
    });'''
          replace_once(events_path, visible_calendars_old, visible_calendars_new)

          assigned_block_old = r'''    if (
      !context.canViewAllJobs &&
      normalizedCurrentRole === 'employee' &&
      context.canViewAssignedJobs &&
      context.employeeIds.length > 0
    ) {
      const { data: assignedRows, error: assignedError } = await serviceSupabase
        .from('opc_job_assignments')
        .select('job_id')
        .in('employee_id', context.employeeIds)
        .not('job_id', 'is', null);

      if (assignedError) throw assignedError;

      assignedJobIds = new Set(
        (assignedRows || [])
          .map((row: AnyRow) => row.job_id)
          .filter(Boolean)
      );
    }'''
          assigned_block_new = r'''    if (
      !context.canViewAllJobs &&
      normalizedCurrentRole === 'employee' &&
      context.canViewAssignedJobs
    ) {
      assignedJobIds = await fetchAssignedJobIdsForUser(serviceSupabase, context, user.id);
    }'''
          replace_once(events_path, assigned_block_old, assigned_block_new)

          feed_path = 'src/pages/api/opc/jobs/feed.ts'
          feed_helper_pattern = r'''async function fetchAssignedJobIds\(\n  serviceSupabase: ReturnType<typeof createClient>,\n  employeeIds: string\[\]\n\) \{.*?\n\}\n\nasync function fetchJobsByIds'''
          feed_helper_replacement = r'''async function fetchAssignedJobIds(
  serviceSupabase: ReturnType<typeof createClient>,
  identifiers: { staffRoleIds: string[]; employeeIds: string[]; userId: string }
) {
  const jobIds = new Set<string>();
  const inactiveStatuses = new Set([
    'removed',
    'unassigned',
    'cancelled',
    'canceled',
    'deleted',
    'inactive',
    'rejected',
  ]);
  const allIdentifiers = uniqueValues([
    ...identifiers.staffRoleIds,
    ...identifiers.employeeIds,
    identifiers.userId,
  ]);
  const attempts: Array<{ column: string; values: string[] }> = [
    { column: 'staff_role_id', values: identifiers.staffRoleIds },
    { column: 'staff_id', values: identifiers.staffRoleIds },
    { column: 'employee_id', values: identifiers.employeeIds },
    { column: 'user_id', values: [identifiers.userId] },
    { column: 'employee_user_id', values: [identifiers.userId] },
    { column: 'assigned_to', values: allIdentifiers },
  ];

  for (const attempt of attempts) {
    if (attempt.values.length === 0) continue;

    for (const valueChunk of chunk(attempt.values, 100)) {
      const { data, error } = await serviceSupabase
        .from('opc_job_assignments')
        .select('job_id,status')
        .in(attempt.column, valueChunk)
        .not('job_id', 'is', null)
        .range(0, 9999);

      if (error) {
        const code = String(error.code || '');
        const message = String(error.message || '').toLowerCase();
        if (code === '42703' || (message.includes('column') && message.includes('does not exist'))) {
          continue;
        }
        throw error;
      }

      for (const row of data || []) {
        const status = String(row.status || 'assigned').toLowerCase();
        if (!inactiveStatuses.has(status) && row.job_id) jobIds.add(String(row.job_id));
      }
    }
  }

  return Array.from(jobIds);
}

async function fetchJobsByIds'''
          regex_once(feed_path, feed_helper_pattern, feed_helper_replacement)
          replace_once(
              feed_path,
              'const assignedJobIds = await fetchAssignedJobIds(serviceSupabase, context.employeeIds);',
              '''const assignedJobIds = await fetchAssignedJobIds(serviceSupabase, {
        staffRoleIds: context.staffRoleIds,
        employeeIds: context.employeeIds,
        userId: user.id,
      });''',
          )
          replace_once(
              feed_path,
              "      context.canViewAssignedJobs &&\n      context.employeeIds.length > 0",
              "      context.canViewAssignedJobs",
          )

          create_job_path = 'src/pages/api/opc/create-service-job.ts'
          replace_once(
              create_job_path,
              "import { getOpcSupabaseUrl, getOpcSupabaseAnonKey, getOpcSupabaseServiceRoleKey } from '../../../lib/opc-server-env';",
              "import { getOpcSupabaseUrl, getOpcSupabaseAnonKey, getOpcSupabaseServiceRoleKey } from '../../../lib/opc-server-env';\nimport { syncJobCalendarState } from '../../../lib/opc-calendar-job-sync';",
          )
          create_sync_pattern = r'''    const calendarSync = await createCalendarEntriesForJobs\(\{.*?\n    \}\);'''
          create_sync_replacement = r'''    const calendarSyncResults: JsonRecord[] = [];
    const calendarSyncWarnings: string[] = [];

    for (const jobId of jobIds) {
      try {
        calendarSyncResults.push(
          await syncJobCalendarState({
            supabase: adminClient,
            jobId,
            actorUserId: user.id,
          }),
        );
      } catch (error) {
        calendarSyncWarnings.push(
          `Kalender-Sync für Einsatz ${jobId} fehlgeschlagen: ${
            error instanceof Error ? error.message : 'Unbekannter Fehler'
          }`,
        );
      }
    }

    const calendarSync = {
      attempted: jobIds.length,
      created: calendarSyncResults.length,
      attendee_links: calendarSyncResults.reduce(
        (sum, result) => sum + (Array.isArray(result.assigned_staff_role_ids) ? result.assigned_staff_role_ids.length : 0),
        0,
      ),
      team_calendar_id: calendarSyncResults[0]?.team_calendar_id || null,
      employee_calendar_events: calendarSyncResults.reduce(
        (sum, result) => sum + (Array.isArray(result.personal_calendar_ids) ? result.personal_calendar_ids.length : 0),
        0,
      ),
      warnings: calendarSyncWarnings,
    };'''
          regex_once(create_job_path, create_sync_pattern, create_sync_replacement)

          detail_path = 'src/components/EinsatzDetailPage.tsx'
          sync_pattern = r'''  const syncAssignmentToCalendar = async \(employee: EmployeeOption, assignmentId\?: string \| null\) => \{.*?\n  \};\n\n  const handleAddAssignment'''
          sync_replacement = r'''  const syncJobToCalendar = async (jobIdToSync: string) => {
    const { data: sessionData, error: sessionError } = await supabase.auth.getSession();
    const token = sessionData.session?.access_token;

    if (sessionError || !token) {
      throw sessionError || new Error('Keine aktive Sitzung für Kalender-Synchronisation.');
    }

    const response = await fetch(`${baseUrl}/api/opc/calendar/sync-job-assignment`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      },
      body: JSON.stringify({ job_id: jobIdToSync }),
    });
    const result = await response.json().catch(() => null);

    if (!response.ok) {
      throw new Error(result?.error || `Kalender-Synchronisation fehlgeschlagen (${response.status}).`);
    }

    return result;
  };

  const syncAssignmentToCalendar = async (_employee: EmployeeOption, _assignmentId?: string | null) => {
    if (!job) return;
    await syncJobToCalendar(job.job_id);
  };

  const handleAddAssignment'''
          regex_once(detail_path, sync_pattern, sync_replacement)
          replace_once(
              detail_path,
              '      await updateJobRecord(payload);\n\n      setJob((current) =>',
              '      await updateJobRecord(payload);\n      await syncJobToCalendar(job.job_id);\n\n      setJob((current) =>',
          )
          replace_once(
              detail_path,
              '      void syncAssignmentToCalendar(selected, insertedAssignmentId).catch(() => undefined);',
              '      await syncAssignmentToCalendar(selected, insertedAssignmentId);',
          )

          remove_handler_anchor = "\n  const handleInternalNote = async () => {"
          remove_handler = r'''
  const handleRemoveAssignment = async (assignment: JsonRecord) => {
    if (!job || !access.canEdit) return;

    const assignmentId = assignment.id || assignment.assignment_id;
    if (!assignmentId) {
      setActionError('Diese Zuweisung besitzt keine gültige ID und konnte nicht entfernt werden.');
      return;
    }

    const employeeName =
      assignment.employee_name || assignment.display_name || assignment.email || 'Mitarbeiter';
    const confirmed = window.confirm(
      `${employeeName} wirklich von diesem Einsatz entfernen? Der Einsatz verschwindet danach aus dem persönlichen Kalender und der persönlichen Einsatzliste.`,
    );

    if (!confirmed) return;

    setSaving(true);
    setActionMessage(null);
    setActionError(null);

    try {
      const { data, error } = await supabase
        .from('opc_job_assignments')
        .delete()
        .eq('id', String(assignmentId))
        .select('id');

      if (error) throw error;
      if (!Array.isArray(data) || data.length === 0) {
        throw new Error('Die Zuweisung wurde nicht gefunden oder durfte nicht entfernt werden.');
      }

      await syncJobToCalendar(job.job_id);
      await loadJob(false);
      setActionMessage(`${employeeName} wurde vom Einsatz entfernt und der Kalender aktualisiert.`);
    } catch (error) {
      const message = error instanceof Error ? error.message : 'Zuweisung konnte nicht entfernt werden.';
      setActionError(`Entfernen fehlgeschlagen: ${message}`);
    } finally {
      setSaving(false);
    }
  };
'''
          replace_once(detail_path, remove_handler_anchor, remove_handler + remove_handler_anchor)

          assignment_actions_old = r'''              <div className="opc-assignment-actions">
                <StatusBadge status={assignment.assignment_status || assignment.status || 'assigned'} />
                <ContactButtons person={assignment} />
              </div>'''
          assignment_actions_new = r'''              <div className="opc-assignment-actions">
                <StatusBadge status={assignment.assignment_status || assignment.status || 'assigned'} />
                <ContactButtons person={assignment} />
                {access.canEdit ? (
                  <button
                    type="button"
