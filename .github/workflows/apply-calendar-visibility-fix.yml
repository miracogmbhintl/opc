name: Calendar fix validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/opc-calendar-fetch-bridge.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/apply-calendar-visibility-fix.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Build
        shell: bash
        run: |
          set +e
          npm run build > /tmp/opc-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "----- BUILD ERROR -----"
            tail -n 90 /tmp/opc-build.log
            exit "$status"
          fi
          echo "Build completed successfully."
