name: Calendar fix validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/opc-calendar-fetch-bridge.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/apply-calendar-visibility-fix.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
