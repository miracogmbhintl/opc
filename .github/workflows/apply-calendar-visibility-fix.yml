                    disabled={saving}
                    onClick={() => void handleRemoveAssignment(assignment)}
                  >
                    <Trash2 size={15} />
                  </button>
                ) : null}
              </div>'''
          replace_once(detail_path, assignment_actions_old, assignment_actions_new)

          workflow = Path('.github/workflows/apply-calendar-visibility-fix.yml')
          workflow.unlink()
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit validated fixes
        shell: bash
        run: |
          git config user.name "OpenAI Codex"
          git config user.email "codex@openai.com"
          git add src .github/workflows/apply-calendar-visibility-fix.yml
          git commit -m "Fix calendar job visibility and assignment sync"
          git push origin codex/fix-calendar-job-visibility
